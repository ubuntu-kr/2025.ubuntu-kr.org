name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium runtime
        run: npx playwright install --with-deps chromium

      - name: Restore Indico speaker image cache
        id: indico-speaker-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            public/speakers
            src/data/speaker-image-map.json
          key: ${{ runner.os }}-indico-speakers-${{ hashFiles('src/config.ts') }}
          restore-keys: |
            ${{ runner.os }}-indico-speakers-

      - name: Fetch Indico speaker images
        run: npm run image-fetch

      - name: Build website
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Save Indico speaker image cache
        if: always() && steps.indico-speaker-cache.outputs.cache-hit != 'true' && hashFiles('public/speakers/*') != ''
        uses: actions/cache/save@v5
        with:
          path: |
            public/speakers
            src/data/speaker-image-map.json
          key: ${{ steps.indico-speaker-cache.outputs.cache-primary-key }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
